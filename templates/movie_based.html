<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Movie Recommendation
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    {% include 'navbar.html' %}

    <div class="search-page">

        <h1>
            Recommend Based On A Movie
        </h1>

        <form action="/recommend"
              method="POST">

            <input type="text"
                   name="movie"
                   list="movies"
                   placeholder="Search movie..."
                   required>

            <datalist id="movies">

                {% for movie in movie_list %}

                <option value="{{ movie }}">

                {% endfor %}

            </datalist>

            <button type="submit">
                Get Recommendations
            </button>

        </form>

    </div>

</body>

</html>
